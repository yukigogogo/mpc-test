<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPC 钱包多协议 Demo</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 980px; margin: 24px auto; padding: 0 12px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    input, select { padding: 8px; margin-right: 8px; }
    button { padding: 8px 12px; cursor: pointer; margin-right: 8px; }
    pre { background: #f6f8fa; padding: 12px; white-space: pre-wrap; word-break: break-all; }
    .fixed-scroll {
      height: 260px;
      overflow: auto;
      resize: none;
    }
  </style>
</head>
<body>
  <h1>MPC 钱包测试 Demo（GG18 / GG20 / CGGMP21 / FROST / EdDSA-TSS）</h1>

  <div class="card">
    <h3>钱包状态</h3>
    <pre id="state" class="fixed-scroll">加载中...</pre>
  </div>

  <div class="card">
    <h3>发起转账（可选协议）</h3>
    <select id="protocol"></select>
    <input id="to" placeholder="收款方，例如 demo-merchant" value="demo-merchant" />
    <input id="amount" type="number" placeholder="金额" value="10" />
    <button onclick="transfer()">发起 MPC 转账</button>
    <button onclick="runBenchmark()">运行协议对比</button>
  </div>

  <div class="card">
    <h3>最近一笔交易（含协议日志 + 加密份额快照 + 指标）</h3>
    <pre id="tx" class="fixed-scroll">暂无交易</pre>
  </div>

  <div class="card">
    <h3>协议性能 / 网络 / 安全对比结果</h3>
    <pre id="benchmark" class="fixed-scroll">点击“运行协议对比”后显示结果</pre>
  </div>

  <div class="card">
    <h3>协议性能 / 网络 / 安全对比结果</h3>
    <pre id="benchmark">点击“运行协议对比”后显示结果</pre>
  </div>

<script>
async function refresh() {
  const s = await fetch('/api/state').then(r => r.json());
  document.getElementById('state').textContent = JSON.stringify(s, null, 2);
  const protocolSelect = document.getElementById('protocol');
  protocolSelect.innerHTML = '';
  (s.protocols || []).forEach(name => {
    const op = document.createElement('option');
    op.value = name;
    op.textContent = name;
    protocolSelect.appendChild(op);
  });
  if (s.lastTransfer) document.getElementById('tx').textContent = JSON.stringify(s.lastTransfer, null, 2);
}

async function transfer() {
  const protocol = document.getElementById('protocol').value;
  const to = document.getElementById('to').value;
  const amount = Number(document.getElementById('amount').value);
  const res = await fetch('/api/transfer', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({protocol, to, amount})
  });
  const text = await res.text();
  if (!res.ok) return alert('转账失败: ' + text);
  document.getElementById('tx').textContent = JSON.stringify(JSON.parse(text), null, 2);
  refresh();
}

async function runBenchmark() {
  const data = await fetch('/api/benchmark').then(r => r.json());
  document.getElementById('benchmark').textContent = JSON.stringify(data, null, 2);
}

refresh();
</script>
</body>
</html>
