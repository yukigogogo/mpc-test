<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPC 钱包 Demo</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 920px; margin: 24px auto; padding: 0 12px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    input { padding: 8px; margin-right: 8px; }
    button { padding: 8px 12px; cursor: pointer; }
    pre { background: #f6f8fa; padding: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h1>MPC 钱包测试 Demo（Go）</h1>
  <div class="card">
    <h3>钱包状态</h3>
    <pre id="state">加载中...</pre>
  </div>

  <div class="card">
    <h3>基础转账</h3>
    <input id="to" placeholder="收款方，例如 demo-merchant" value="demo-merchant" />
    <input id="amount" type="number" placeholder="金额" value="10" />
    <button onclick="transfer()">发起 MPC 转账</button>
  </div>

  <div class="card">
    <h3>最近一笔交易（含 MPC 协议日志）</h3>
    <pre id="tx">暂无交易</pre>
  </div>

<script>
async function refresh() {
  const s = await fetch('/api/state').then(r => r.json());
  document.getElementById('state').textContent = JSON.stringify(s, null, 2);
  if (s.lastTransfer) {
    document.getElementById('tx').textContent = JSON.stringify(s.lastTransfer, null, 2);
  }
}

async function transfer() {
  const to = document.getElementById('to').value;
  const amount = Number(document.getElementById('amount').value);
  const res = await fetch('/api/transfer', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({to, amount})
  });
  const text = await res.text();
  if (!res.ok) {
    alert('转账失败: ' + text);
    return;
  }
  document.getElementById('tx').textContent = JSON.stringify(JSON.parse(text), null, 2);
  refresh();
}

refresh();
</script>
</body>
</html>
